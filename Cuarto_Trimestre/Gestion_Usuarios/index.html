<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <title>Formulario CRUD</title>
  </head>
  <body>
    <script src="cliente.js"></script>
    <div class="container mt-5" id="informacion">
      <div class="card">
        <h3 class="card-header">Gestión de Usuarios</h3>
        <div class="card-body">
          <h5 class="card-title">
            ¡Formulario para Registro, Actualización y Eliminación!
          </h5>
          <p class="card-text">
            En este formulario puedes registrar un usuario, buscarlo por
            documento para actualizar su información o eliminarlo.
          </p>
          <br />
          <form>
            <div class="row justify-content-end">
              <div class="col-md-8 mb-3">
                <input
                  type="text"
                  class="form-control"
                  id="documento"
                  placeholder="Documento"
                  required
                />
              </div>
              <div class="col-md-4 mb-3">
                <input
                  type="button"
                  class="btn btn-primary w-100"
                  value="Buscar"
                  onclick="obtenerPersona()"
                />
              </div>
            </div>
            <div class="row">
              <div class="col-md-4 mb-3">
                <input
                  type="text"
                  class="form-control"
                  id="nombre"
                  placeholder="Nombre"
                  required
                />
              </div>
              <div class="col-md-4 mb-3">
                <input
                  type="text"
                  class="form-control"
                  id="telefono"
                  placeholder="Teléfono"
                  required
                />
              </div>
              <div class="col-md-4 mb-3">
                <input
                  type="number"
                  class="form-control"
                  id="edad"
                  placeholder="Edad"
                  min="1"
                  required
                />
              </div>
            </div>
            <div class="row">
              <div class="col-md-4 mb-3">
                <input
                  type="text"
                  class="form-control"
                  id="profesion"
                  placeholder="Profesión"
                  required
                />
              </div>
              <div class="col-md-4 mb-3">
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  placeholder="Contraseña"
                  required
                />
              </div>
              <div class="col-md-4 mb-3">
                <select class="form-select" id="tipo" required>
                  <option value="">Tipo</option>
                  <option value="1">Admin</option>
                  <option value="2">Usuario</option>
                </select>
              </div>
            </div>
            <div class="row justify-content-end">
              <div class="col-md-auto">
                <input
                  type="button"
                  class="btn btn-primary"
                  value="Registrar"
                  onclick="registrarPersona()"
                />
              </div>
              <div class="col-md-auto">
                <input
                  type="button"
                  class="btn btn-success"
                  value="Actualizar"
                  onclick="actualizarPersona()"
                />
              </div>
              <div class="col-md-auto">
                <input
                  type="button"
                  class="btn btn-danger"
                  value="Eliminar"
                  onclick="eliminarPersona()"
                />
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
